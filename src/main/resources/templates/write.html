<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글쓰기 | SchemaGuard Community</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <div class="container header-inner">
        <a th:href="@{/}" class="logo">🛡️ SchemaGuard Community</a>
        <nav class="nav">
            <a th:href="@{/}">게시글 목록</a>
        </nav>
    </div>
</header>

<main class="container page">
    <section class="card form-card">
        <h1>새 게시글 작성</h1>

        <form th:action="@{/posts}" method="post" class="post-form">
            <div class="form-group">
                <label for="authorNickname">작성자</label>
                <input type="text" id="authorNickname" name="authorNickname" placeholder="작성자 이름" required>
            </div>

            <div class="form-group">
                <label for="categoryId">카테고리</label>
                <select id="categoryId" name="categoryId" required>
                    <option value="">선택하세요</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.name}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="title">제목</label>
                <input type="text" id="title" name="title" placeholder="제목을 입력하세요" required>
            </div>

            <div class="form-group">
                <label for="content">내용</label>
                <textarea id="content" name="content" rows="12" placeholder="내용을 입력하세요" required></textarea>
            </div>

            <div class="form-actions">
                <a th:href="@{/}" class="btn btn-secondary">취소</a>
                <button type="submit" class="btn btn-primary">등록</button>
            </div>
        </form>
    </section>
</main>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
