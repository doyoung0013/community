<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 정보 | SchemaGuard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <div class="container header-inner">
        <a th:href="@{/}" class="logo">🛡️ SchemaGuard Community</a>
        <nav class="nav">
            <a th:href="@{/}">홈</a>
            <form th:action="@{/logout}" method="post" class="inline-form">
                <button type="submit" class="btn btn-secondary">로그아웃</button>
            </form>
        </nav>
    </div>
</header>

<main class="container page">
    <section class="card">
        <h1>내 정보</h1>
        <p><strong>이메일:</strong> <span th:text="${user.email}"></span></p>
        <p><strong>닉네임:</strong> <span th:text="${user.nickname}"></span></p>
        <p><strong>상태:</strong> <span th:text="${user.status}"></span></p>
        <p><strong>권한:</strong> <span th:text="${user.role}"></span></p>
    </section>
</main>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
