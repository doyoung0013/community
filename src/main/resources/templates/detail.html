<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 상세 | SchemaGuard Community</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <div class="container header-inner">
        <a th:href="@{/}" class="logo">🛡️ SchemaGuard Community</a>
        <nav class="nav">
            <a th:href="@{/}">게시글 목록</a>
            <a th:if="${isAuthenticated}" th:href="@{/posts/write}" class="btn btn-primary">글쓰기</a>
        </nav>
    </div>
</header>

<main class="container page">
    <section class="card post-detail">
        <div class="detail-top">
            <span class="badge" th:text="${post.categoryName}">카테고리</span>

            <div class="detail-actions" th:if="${post.owner}">
                <a class="btn btn-secondary" th:href="@{/posts/{id}/edit(id=${post.id})}">수정</a>
                <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post" class="inline-form">
                    <button type="submit" class="btn btn-danger" onclick="return confirm('정말 삭제하시겠습니까?');">삭제</button>
                </form>
            </div>
        </div>

        <h1 th:text="${post.title}">게시글 제목</h1>

        <div class="meta">
            <span th:text="|작성자: ${post.authorNickname}|">작성자</span>
            <span th:text="|작성일: ${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}|">작성일</span>
            <span th:text="|수정일: ${post.updatedAt != null ? #temporals.format(post.updatedAt, 'yyyy-MM-dd HH:mm') : '-'}|">수정일</span>
            <span th:text="|좋아요: ${post.likeCount}|">좋아요</span>
        </div>

        <article class="detail-content" th:text="${post.content}">게시글 내용</article>

        <div class="detail-bottom">
            <form th:if="${isAuthenticated}" th:action="@{/posts/{id}/like(id=${post.id})}" method="post" class="inline-form">
                <button type="submit" class="btn btn-primary">좋아요 ❤️</button>
            </form>
            <a th:href="@{/}" class="btn btn-secondary">목록으로</a>
        </div>
    </section>
</main>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
