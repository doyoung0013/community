<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 상세 | SchemaGuard Community</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <div class="container header-inner">
        <a th:href="@{/}" class="logo">🛡️ SchemaGuard Community</a>
        <nav class="nav">
            <a th:href="@{/}">게시글 목록</a>
            <a th:href="@{/posts/write}" class="btn btn-primary">글쓰기</a>
        </nav>
    </div>
</header>

<main class="container page">
    <section class="card post-detail">
        <div class="detail-top">
            <span class="badge" th:text="${post.category.name}">카테고리</span>

            <div class="detail-actions">
                <a class="btn btn-secondary" th:href="@{/posts/{id}/edit(id=${post.id})}">수정</a>

                <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post" class="inline-form">
                    <button type="submit" class="btn btn-danger"
                            onclick="return confirm('정말 삭제하시겠습니까?');">
                        삭제
                    </button>
                </form>
            </div>
        </div>

        <h1 th:text="${post.title}">게시글 제목</h1>

        <div class="meta">
            <span th:text="|작성자: ${post.author.nickname}|">작성자</span>
            <span th:text="|작성일: ${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}|">작성일</span>
            <span th:text="|수정일: ${post.updatedAt != null ? #temporals.format(post.updatedAt, 'yyyy-MM-dd HH:mm') : '-'}|">수정일</span>
            <span th:text="|좋아요: ${post.likeCount}|">좋아요: 0</span>
        </div>

        <article class="detail-content" th:text="${post.content}">
            게시글 내용
        </article>

        <div class="detail-bottom">
            <form th:action="@{/posts/{id}/like(id=${post.id})}" method="post" class="inline-form">
                <button type="submit" class="btn btn-primary">좋아요 ❤️</button>
            </form>
            <a th:href="@{/}" class="btn btn-secondary">목록으로</a>
        </div>
    </section>

    <section class="card comment-section">
        <h2>댓글</h2>

        <form th:action="@{/posts/{id}/comments(id=${post.id})}" method="post" class="comment-form">
            <input type="text" name="authorNickname" placeholder="작성자 이름" required>
            <textarea name="content" placeholder="댓글을 입력하세요" required></textarea>
            <button type="submit" class="btn btn-primary">댓글 등록</button>
        </form>

        <div class="comment-list" th:if="${!#lists.isEmpty(comments)}">
            <div class="comment-item" th:each="comment : ${comments}">
                <div class="comment-meta">
                    <strong th:text="${comment.author.nickname}">작성자</strong>
                    <span th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}">2026-04-07 14:10</span>
                </div>
                <div class="comment-content" th:text="${comment.content}">댓글 내용</div>
            </div>
        </div>

        <div class="empty-state" th:if="${#lists.isEmpty(comments)}">
            아직 댓글이 없습니다.
        </div>
    </section>
</main>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
