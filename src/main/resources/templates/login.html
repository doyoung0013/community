<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | SchemaGuard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <h1>로그인</h1>

        <div class="alert success" th:if="${param.signupSuccess}">
            회원가입이 완료되었습니다. 로그인해주세요.
        </div>

        <div class="alert error" th:if="${param.error}">
            이메일 또는 비밀번호가 올바르지 않습니다.
        </div>

        <form th:action="@{/login}" method="post" class="auth-form">
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" placeholder="이메일 입력" required>
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="비밀번호 입력" required>
            </div>

            <button type="submit" class="btn btn-primary full-width">로그인</button>
        </form>

        <div class="auth-links">
            <a th:href="@{/signup}">회원가입</a>
            <a th:href="@{/}">홈으로</a>
        </div>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
