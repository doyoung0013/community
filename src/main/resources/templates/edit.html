<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 수정 | SchemaGuard Community</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="site-header">
    <div class="container header-inner">
        <a th:href="@{/}" class="logo">🛡️ SchemaGuard Community</a>
        <nav class="nav">
            <a th:href="@{/}">게시글 목록</a>
        </nav>
    </div>
</header>

<main class="container page">
    <section class="card form-card">
        <h1>게시글 수정</h1>

        <form th:action="@{/posts/{id}/edit(id=${post.id})}" method="post" class="post-form">
            <div class="form-group">
                <label for="authorNickname">작성자</label>
                <input type="text" id="authorNickname" th:value="${post.author.nickname}" readonly>
            </div>

            <div class="form-group">
                <label for="categoryId">카테고리</label>
                <select id="categoryId" name="categoryId" required>
                    <option value="">선택하세요</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.name}"
                            th:selected="${post.category.id == category.id}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="title">제목</label>
                <input type="text" id="title" name="title" th:value="${post.title}" required>
            </div>

            <div class="form-group">
                <label for="content">내용</label>
                <textarea id="content" name="content" rows="12" required th:text="${post.content}"></textarea>
            </div>

            <div class="form-actions">
                <a th:href="@{/posts/{id}(id=${post.id})}" class="btn btn-secondary">취소</a>
                <button type="submit" class="btn btn-primary">수정 완료</button>
            </div>
        </form>
    </section>
</main>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
